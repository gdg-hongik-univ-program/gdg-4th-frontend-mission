<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>자기소개 페이지</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- 사진 첨부 (이미지는 같은 폴더에 있어야 함) -->
    <img src="my-photo.jpg" alt="내 사진" class="profile" />

    <!-- 인사 텍스트 -->
    <h1>안녕하세요! 저는 혁주입니다 👋</h1>

    <!-- 버튼 클릭 시 콘솔에 인삿말 -->
    <button onclick="sayHello()">인사하기</button>

    <!-- 입력값 콘솔에 출력 -->
    <form onsubmit="handleSubmit(event)">
      <input type="text" id="userInput" placeholder="당신의 이름은?" required />
      <button type="submit">출력하기</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
